name: Create content from issue form

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  create:
    if: github.actor == 'mythreyiramesh' || github.actor == 'harshitaramesh'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Detect content type from issue body
        id: type
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body || '';
            // new-question.yml has a "### Priority" section; new-post.yml does not
            const type = body.includes('### Priority') ? 'new-question' : 'new-post';
            core.setOutput('value', type);

      - name: Parse issue form fields
        id: parse
        uses: stefanbuck/github-issue-parser@v3
        with:
          template-path: .github/ISSUE_TEMPLATE/${{ steps.type.outputs.value }}.yml

      - name: Create content file
        id: create
        env:
          CONTENT_TYPE: ${{ steps.type.outputs.value }}
          FIELD_TITLE: ${{ steps.parse.outputs.issueparser_title }}
          FIELD_AUTHOR: ${{ steps.parse.outputs.issueparser_author }}
          FIELD_TAGS: ${{ steps.parse.outputs.issueparser_tags }}
          FIELD_BODY: ${{ steps.parse.outputs.issueparser_body }}
          FIELD_PRIORITY: ${{ steps.parse.outputs.issueparser_priority }}
        run: |
          created=$(node .github/scripts/create-content.mjs)
          echo "path=$created" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ steps.create.outputs.path }}"
          git commit -m "Add ${{ steps.type.outputs.value }}: ${{ steps.parse.outputs.issueparser_title }}"
          git push

      - name: Apply label, comment, and close
        uses: actions/github-script@v7
        with:
          script: |
            const type = '${{ steps.type.outputs.value }}';
            const path = '${{ steps.create.outputs.path }}';
            const baseUrl = 'https://a-doctor-and-a-phd.github.io/anveshana';

            // Create label if it doesn't exist, then apply it
            const colors = { 'new-post': '0075ca', 'new-question': 'e4e669' };
            try {
              await github.rest.issues.createLabel({
                owner: context.repo.owner, repo: context.repo.repo,
                name: type, color: colors[type],
              });
            } catch (_) { /* label already exists */ }
            await github.rest.issues.addLabels({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number, labels: [type],
            });

            // Build live URL
            let liveUrl = '';
            if (type === 'new-post') {
              const m = path.match(/_posts\/(\d{4})-(\d{2})-(\d{2})-(.+)\.md$/);
              if (m) liveUrl = `${baseUrl}/${m[1]}/${m[2]}/${m[3]}/${m[4]}.html`;
            } else {
              const m = path.match(/_questions\/(.+)\.md$/);
              if (m) liveUrl = `${baseUrl}/questions/${m[1]}/`;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `File created: \`${path}\`\n\nOnce GitHub Pages rebuilds (usually under a minute), it will be live at: ${liveUrl}`,
            });
            await github.rest.issues.update({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number, state: 'closed',
            });
