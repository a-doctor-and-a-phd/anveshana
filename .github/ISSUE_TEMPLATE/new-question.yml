name: New Question
description: Record a question you're curious about. A bot will create the file and commit it automatically.
labels: [new-question]
body:
  - type: input
    id: title
    attributes:
      label: Question Title
      placeholder: "How many bird calls do different birds have?"
    validations:
      required: true

  - type: dropdown
    id: author
    attributes:
      label: Author
      options:
        - Mythreyi
        - Harshita
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - medium
        - high
        - low
    validations:
      required: true

  - type: input
    id: tags
    attributes:
      label: Tags
      description: Comma-separated list of topics.
      placeholder: "nature, birds"
    validations:
      required: true

  - type: textarea
    id: body
    attributes:
      label: Details
      description: Provide background or context for your question.
      placeholder: "There are definitely many, but how does the number of bird calls depend on the type of bird species?"
    validations:
      required: true
